name: Build and Publish Repo

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl perl zip unzip fakeroot dpkg-dev clang-15 libc6-dev

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "$HOME/theos/bin" >> $GITHUB_PATH

      - name: Download iOS SDK
        run: |
          curl -L -o sdk.tar.xz "https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS15.6.sdk.tar.xz"
          mkdir -p $HOME/theos/sdks
          tar -xf sdk.tar.xz -C $HOME/theos/sdks
          ls $HOME/theos/sdks

      - name: Compile .deb
        run: |
          echo "Struttura repo:"
          ls -la
          echo "---"
          find . -name "Makefile" 2>/dev/null
          echo "---"
          # Entra nella cartella giusta
          TWEAK_DIR=$(find . -name "Makefile" | head -1 | xargs dirname)
          echo "Cartella tweak: $TWEAK_DIR"
          cd "$TWEAK_DIR"
          make package FINALPACKAGE=1 2>&1

      - name: Prepare APT repo structure
        run: |
          mkdir -p repo/debs
          cp SiriAIOverhaul/packages/*.deb repo/debs/

          cat > repo/Release << 'EOF'
          Origin: SiriAIOverhaul Repo
          Label: SiriAIOverhaul
          Suite: stable
          Version: 1.0
          Architectures: iphoneos-arm64
          Components: main
          Description: Repo per SiriAIOverhaul
          EOF

          DEB=$(ls repo/debs/*.deb)
          SIZE=$(wc -c < "$DEB" | tr -d ' ')
          MD5=$(md5sum "$DEB" | awk '{print $1}')
          SHA256=$(sha256sum "$DEB" | awk '{print $1}')
          FILENAME=$(basename "$DEB")

          cat > repo/Packages << EOF
          Package: com.tuonome.siriaioverhaul
          Name: SiriAIOverhaul
          Version: 1.0.0
          Architecture: iphoneos-arm64
          Description: Sostituisce Siri con ChatGPT / Gemini
          Maintainer: Il Tuo Nome <tuo@email.com>
          Section: Tweaks
          Depends: mobilesubstrate (>= 0.9.7000), firmware (>= 15.0)
          Filename: debs/$FILENAME
          Size: $SIZE
          MD5sum: $MD5
          SHA256: $SHA256
          EOF

          gzip -k repo/Packages
          echo "<h1>SiriAIOverhaul Repo</h1>" > repo/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
          publish_branch: gh-pages
